<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Agents Lead Journey</title>
  <meta name="description" content="Lead journey dashboard for the AI Sales Agent pipeline.">
  <style>
    :root {
      --bg: #06131d;
      --bg-2: #0c2131;
      --panel: rgba(8, 20, 31, 0.8);
      --panel-strong: rgba(9, 24, 37, 0.94);
      --line: rgba(91, 210, 255, 0.22);
      --line-strong: rgba(91, 210, 255, 0.78);
      --text: #f3fbff;
      --muted: #9ab7c9;
      --accent: #5bd2ff;
      --accent-2: #6effc7;
      --accent-soft: rgba(91, 210, 255, 0.13);
      --shadow: 0 26px 80px rgba(1, 7, 12, 0.42);
      --danger: #ff7a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(91, 210, 255, 0.14), transparent 28%),
        radial-gradient(circle at 88% 78%, rgba(110, 255, 199, 0.12), transparent 24%),
        linear-gradient(180deg, #07111a 0%, #0a1825 48%, #07111a 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.08));
    }
    .shell {
      width: min(1360px, calc(100vw - 28px));
      margin: 16px auto 36px;
      position: relative;
      z-index: 1;
    }
    .panel {
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }
    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
      margin-bottom: 8px;
    }
    h1, h2, h3, p {
      margin: 0;
    }
    .title {
      font-size: clamp(30px, 4.8vw, 54px);
      line-height: 0.95;
      font-weight: 900;
      white-space: nowrap;
    }
    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 760px;
    }
    .status-stack {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 250px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(91, 210, 255, 0.14);
      background: rgba(7, 19, 29, 0.72);
      color: var(--muted);
      font-size: 13px;
    }
    .status-light {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #ff5d5d;
      box-shadow: 0 0 14px rgba(255, 93, 93, 0.35);
      flex: 0 0 auto;
    }
    .status-light.connected {
      background: #63f59a;
      box-shadow: 0 0 14px rgba(99, 245, 154, 0.35);
    }
    .journey {
      padding: 22px;
      overflow: hidden;
    }
    .journey-stage {
      position: relative;
      border-radius: 24px;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 32%, rgba(91, 210, 255, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(10, 23, 35, 0.92), rgba(6, 15, 24, 0.96));
      overflow: hidden;
    }
    .journey-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(91, 210, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91, 210, 255, 0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,0.94), rgba(0,0,0,0.22) 76%);
      pointer-events: none;
    }
    .journey-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .journey-grid {
      position: relative;
      z-index: 1;
    }
    .journey-headline {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 18px;
    }
    .journey-headline p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .journey-stage-labels {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      margin-bottom: 12px;
      align-items: center;
    }
    .journey-stage-labels-track {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .journey-stage-label {
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: center;
    }
    .journey-list {
      display: grid;
      gap: 12px;
    }
    .journey-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid rgba(91, 210, 255, 0.09);
    }
    .journey-row:first-child {
      border-top: 0;
      padding-top: 0;
    }
    .journey-lead {
      min-width: 0;
    }
    .journey-lead-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .journey-lead-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .journey-track {
      position: relative;
      height: 42px;
    }
    .journey-track::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: rgba(91, 210, 255, 0.12);
    }
    .journey-track-line {
      position: absolute;
      left: 0;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: var(--lead-color, var(--accent));
      box-shadow: 0 0 18px color-mix(in srgb, var(--lead-color, var(--accent)) 28%, transparent);
    }
    .journey-stop {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #0f2433;
      border: 2px solid rgba(91, 210, 255, 0.22);
    }
    .journey-stop.done {
      background: var(--lead-color, var(--accent));
      border-color: var(--lead-color, var(--accent));
    }
    .journey-stop.current {
      width: 18px;
      height: 18px;
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--lead-color, var(--accent)) 18%, transparent);
    }
    .journey-empty {
      padding: 24px 0 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .summary-layout {
      margin-top: 18px;
    }
    .summary-panel {
      padding: 22px;
    }
    .summary-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .summary-card {
      border-radius: 18px;
      padding: 14px;
      background: rgba(91, 210, 255, 0.06);
      border: 1px solid rgba(91, 210, 255, 0.1);
      min-height: 112px;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .summary-card.active {
      background: rgba(110, 255, 199, 0.08);
      border-color: rgba(110, 255, 199, 0.28);
    }
    .summary-label {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
    }
    .summary-value {
      font-size: 30px;
      line-height: 0.9;
      font-weight: 900;
    }
    .summary-text {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(110, 255, 199, 0.4); }
      70% { box-shadow: 0 0 0 16px rgba(110, 255, 199, 0); }
      100% { box-shadow: 0 0 0 0 rgba(110, 255, 199, 0); }
    }
    @keyframes flow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -48; }
    }
    @media (max-width: 1080px) {
      .topbar {
        grid-template-columns: 1fr;
        display: grid;
      }
      .status-stack {
        min-width: 0;
      }
      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
    @media (max-width: 760px) {
      .shell {
        width: min(100vw - 16px, 1360px);
      }
      .title {
        white-space: normal;
      }
      .journey-stage {
        min-height: 860px;
      }
      .journey-stage-labels,
      .journey-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .journey-stage-labels-track {
        gap: 8px;
      }
      .journey-lead-name {
        white-space: normal;
      }
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">AI Sales Agent Dashboard</div>
        <h1 class="title">Lead Journey Across The Brains</h1>
      </div>
      <div class="status-stack">
        <span class="status-light" id="status-light"></span>
        <span>Last updated: <strong id="last-updated">No data</strong></span>
      </div>
    </header>

    <section class="panel journey">
      <div class="journey-stage">
        <div class="journey-grid">
          <div class="journey-headline">
            <div>
              <div class="eyebrow">Active Lead Flow</div>
              <h2>Lead Journey Across The Brains</h2>
            </div>
            <p>Only leads currently moving from Brain 3 toward approval are shown here.</p>
          </div>
          <div class="journey-stage-labels">
            <div></div>
            <div class="journey-stage-labels-track">
              <div class="journey-stage-label">Brain 3</div>
              <div class="journey-stage-label">Brain 5</div>
              <div class="journey-stage-label">Lead Approval</div>
              <div class="journey-stage-label">Message Approval</div>
            </div>
          </div>
          <div class="journey-list" id="journey-list"></div>
        </div>
      </div>
    </section>

    <section class="summary-layout">
      <section class="panel summary-panel">
        <div class="eyebrow">Stage Summary</div>
        <h2>Counts By Pipeline Step</h2>
        <div class="summary-grid" id="summary-grid"></div>
      </section>
    </section>
  <script src="dashboard.js"></script>
  </main>
</body>
</html>
