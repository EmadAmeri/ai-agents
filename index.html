<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lead Agent Pulse</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="cockpit">
      <section class="pulse-panel">
        <div class="orb-wrap">
          <div class="orb" id="agentOrb"></div>
          <div class="ring ring-a"></div>
          <div class="ring ring-b"></div>
        </div>
        <div>
          <p class="eyebrow">Agent Pulse</p>
          <h1 id="agentState">Paused</h1>
          <p id="agentSub">Waiting for the next cycle</p>
        </div>
      </section>

      <section class="flow-panel">
        <div class="section-head">
          <span>Lead Flow</span>
          <strong id="updatedAt">--</strong>
        </div>
        <div class="pipeline" id="leadFlow"></div>
      </section>

      <section class="grid">
        <div class="panel source-map">
          <div class="section-head"><span>Source Map</span></div>
          <div class="nodes" id="sourceNodes"></div>
        </div>

        <div class="panel funnel-panel">
          <div class="section-head"><span>Quality Funnel</span></div>
          <div class="funnel" id="qualityFunnel"></div>
        </div>

        <div class="panel loop-panel">
          <div class="section-head"><span>Learning Loop</span></div>
          <div class="loop">
            <span>Search</span><span>Score</span><span>Enrich</span><span>Review</span><span>Improve</span>
          </div>
        </div>

        <div class="panel progress-panel">
          <div class="section-head"><span>Daily Progress</span></div>
          <div class="rings" id="progressRings"></div>
        </div>
      </section>

      <section class="bottom-grid">
        <div class="panel leads-panel">
          <div class="section-head"><span>Best Leads</span></div>
          <div class="lead-cards" id="leadCards"></div>
        </div>
        <div class="panel memory-panel">
          <div class="section-head"><span>Agent Memory</span></div>
          <div class="memory-tags" id="memoryTags"></div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
